<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Your Daily Forecast</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .location-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .location-icon {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .location-text {
            font-size: 18px;
            font-weight: 500;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .main-weather {
            text-align: center;
            margin-bottom: 40px;
        }

        .weather-icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .temperature {
            font-size: 72px;
            font-weight: 200;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .weather-description {
            font-size: 20px;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .feels-like {
            font-size: 16px;
            opacity: 0.7;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-icon {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .detail-label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hourly-forecast {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .hourly-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .hourly-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            min-width: 60px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hourly-time {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .hourly-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .hourly-temp {
            font-size: 14px;
            font-weight: 500;
        }

        .daily-forecast {
            margin-bottom: 20px;
        }

        .daily-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .daily-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .daily-day {
            font-size: 14px;
            font-weight: 500;
            min-width: 80px;
        }

        .daily-icon {
            font-size: 20px;
            margin: 0 15px;
        }

        .daily-temps {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .daily-min {
            font-size: 14px;
            opacity: 0.7;
        }

        .daily-max {
            font-size: 14px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.18);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            color: #fca5a5;
        }

        /* Scrollbar styling */
        .hourly-container::-webkit-scrollbar {
            height: 4px;
        }

        .hourly-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .hourly-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .hourly-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .version-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <div id="app">
            <div class="loading">
                <div>🌤 Chargement de l'application météo...</div>
            </div>
        </div>
    </div>

    <script>
        // API Open-Meteo
        const fetchWeatherData = async (city) => {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.latitude}&longitude=${city.longitude}` +
                `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code,is_day,uv_index,visibility,pressure_msl,precipitation` +
                `&hourly=temperature_2m,weather_code,is_day,precipitation_probability,relative_humidity_2m,wind_speed_10m` +
                `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max` +
                `&timezone=auto&forecast_days=7&wind_speed_unit=kmh&temperature_unit=celsius&_=${Date.now()}`;
            
            try {
                const response = await fetch(url);
                return await response.json();
            } catch (error) {
                console.error('Erreur API:', error);
                return null;
            }
        };

        // Description météo
        const describeWeather = (code, isDay) => {
            const weatherTypes = {
                0: { label: 'Ciel dégagé', icon: '☀️' },
                1: { label: 'Ciel dégagé', icon: '🌤' },
                2: { label: 'Partiellement nuageux', icon: '⛅' },
                3: { label: 'Couvert', icon: '☁️' },
                45: { label: 'Brouillard', icon: '🌫' },
                48: { label: 'Brouillard', icon: '🌫' },
                51: { label: 'Bruine légère', icon: '🌦' },
                53: { label: 'Bruine modérée', icon: '🌧' },
                55: { label: 'Bruine dense', icon: '🌧' },
                56: { label: 'Bruine verglaçante', icon: '🌨' },
                57: { label: 'Bruine verglaçante', icon: '🌨' },
                61: { label: 'Pluie', icon: '🌧' },
                63: { label: 'Pluie modérée', icon: '🌧' },
                65: { label: 'Forte pluie', icon: '⛈' },
                66: { label: 'Pluie verglaçante', icon: '🌨' },
                67: { label: 'Pluie verglaçante', icon: '🌨' },
                71: { label: 'Neige légère', icon: '🌨' },
                73: { label: 'Neige modérée', icon: '❄️' },
                75: { label: 'Neige dense', icon: '❄️' },
                77: { label: 'Neige verglaçante', icon: '🌨' },
                80: { label: 'Averses', icon: '🌦' },
                81: { label: 'Averses', icon: '🌧' },
                82: { label: 'Averses', icon: '🌧' },
                85: { label: 'Neige', icon: '❄️' },
                86: { label: 'Neige', icon: '❄️' },
                95: { label: 'Orage', icon: '⛈' },
                96: { label: 'Orage', icon: '⛈' },
                99: { label: 'Orage', icon: '⛈' }
            };
            
            return weatherTypes[code] || { label: 'Inconnu', icon: '❓' };
        };

        // Fonction principale
        const initWeatherApp = async () => {
            const city = {
                id: 4164138,
                name: "Paris",
                country: "France",
                latitude: 48.8566,
                longitude: 2.3522,
                timezone: "auto"
            };
            
            try {
                // Afficher le chargement
                const app = document.getElementById('app');
                app.innerHTML = '<div class="loading"><div>🌤 Chargement des données météo...</div></div>';
                
                // Charger les données
                const weatherData = await fetchWeatherData(city);
                
                if (weatherData) {
                    // Obtenir l'heure locale
                    const now = new Date();
                    const currentHour = now.getHours();
                    const isDayTime = currentHour >= 6 && currentHour < 20;

                    // Prévisions horaires
                    const hourlySlice = (() => {
                        const idx = 0;
                        const endIdx = Math.min(idx + 24, weatherData.hourly.time.length);
                        const result = [];

                        for (let i = idx; i < endIdx; i++) {
                            const hourDate = new Date(weatherData.hourly.time[i]);
                            const hour = hourDate.getHours();
                            const hourIsDay = hour >= 6 && hour < 20;
                            
                            const temp = Math.round(weatherData.hourly.temperature_2m[i]);
                            const weather = describeWeather(weatherData.hourly.weather_code[i], hourIsDay ? 1 : 0);
                            
                            const progressiveHour = (currentHour + (i - idx)) % 24;
                            
                            result.push({
                                time: i === idx ? "mtn" : `${progressiveHour.toString().padStart(2, '0')}H`,
                                temp: temp,
                                info: weather,
                                isDay: hourIsDay,
                                hour: hour
                            });
                        }
                        return result;
                    })();

                    const currentWeather = describeWeather(weatherData.current.weather_code, isDayTime ? 1 : 0);

                    // Afficher l'application
                    app.innerHTML = `
                        <div class="location-header">
                            <div class="location-info">
                                <div class="location-icon">📍</div>
                                <div class="location-text">${city.name}</div>
                            </div>
                            <div class="menu-icon">☰</div>
                        </div>

                        <div class="main-weather">
                            <div class="weather-icon">${currentWeather.icon}</div>
                            <div class="temperature">${Math.round(weatherData.current.temperature_2m)}°</div>
                            <div class="weather-description">${currentWeather.label}</div>
                            <div class="feels-like">Ressenti ${Math.round(weatherData.current.apparent_temperature)}°</div>
                        </div>

                        <div class="weather-details">
                            <div class="detail-card">
                                <div class="detail-icon">💨</div>
                                <div class="detail-value">${Math.round(weatherData.current.wind_speed_10m)}</div>
                                <div class="detail-label">Vent km/h</div>
                            </div>
                            <div class="detail-card">
                                <div class="detail-icon">💧</div>
                                <div class="detail-value">${weatherData.current.relative_humidity_2m}%</div>
                                <div class="detail-label">Humidité</div>
                            </div>
                            <div class="detail-card">
                                <div class="detail-icon">🌧</div>
                                <div class="detail-value">${weatherData.daily.precipitation_probability_max[0]}%</div>
                                <div class="detail-label">Pluie</div>
                            </div>
                        </div>

                        <div class="hourly-forecast">
                            <div class="section-title">Prévisions horaires</div>
                            <div class="hourly-container">
                                ${hourlySlice.slice(0, 12).map((hour, i) => `
                                    <div class="hourly-item">
                                        <div class="hourly-time">${hour.time}</div>
                                        <div class="hourly-icon">${hour.info.icon}</div>
                                        <div class="hourly-temp">${hour.temp}°</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="daily-forecast">
                            <div class="section-title">Prévisions sur 7 jours</div>
                            <div class="daily-container">
                                ${weatherData.daily.time.map((_, i) => {
                                    const dayWeather = describeWeather(weatherData.daily.weather_code[i], 1);
                                    const days = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
                                    const dayName = i === 0 ? "Aujourd'hui" : days[new Date(weatherData.daily.time[i]).getDay()];
                                    
                                    return `
                                        <div class="daily-item">
                                            <div class="daily-day">${dayName}</div>
                                            <div class="daily-icon">${dayWeather.icon}</div>
                                            <div class="daily-temps">
                                                <div class="daily-min">${Math.round(weatherData.daily.temperature_2m_min[i])}°</div>
                                                <div class="daily-max">${Math.round(weatherData.daily.temperature_2m_max[i])}°</div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    throw new Error('Données météo non disponibles');
                }
                
            } catch (error) {
                console.error('Erreur:', error);
                const app = document.getElementById('app');
                app.innerHTML = '<div class="error"><div>❌ Impossible de charger les données météo</div></div>';
            }
        };

        // Démarrer l'application lorsque le DOM est chargé
        document.addEventListener('DOMContentLoaded', initWeatherApp);
    </script>
<div class="version-info" id="versionInfo">v1.0</div>

    <script>
        // Version pour forcer la mise à jour
        const APP_VERSION = '1.0.' + Date.now();
        document.getElementById('versionInfo').textContent = APP_VERSION;
